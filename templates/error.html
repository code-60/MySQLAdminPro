<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>phpMyAdmin Pro v1.0 | Ошибка {{ status_code }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
    </style>
</head>
<body class="bg-[#fcfcfc] text-slate-900 min-h-screen flex flex-col">
    <main class="flex-1 flex items-center justify-center px-6">
        <div class="w-full max-w-2xl bg-white border border-slate-200 rounded-3xl shadow-sm p-8 md:p-10">
            <div class="inline-flex items-center px-3 py-1 rounded-full bg-rose-50 border border-rose-200 text-rose-700 text-xs font-semibold mb-5">
                Ошибка {{ status_code }}
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">{{ error_title }}</h1>
            <p class="mt-3 text-sm text-slate-600 break-words">{{ error_message }}</p>

            <div class="mt-7 flex items-center gap-3">
                {% if back_url %}
                <a href="{{ back_url }}" class="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800">Вернуться назад</a>
                {% else %}
                <a href="{{ url_for('index') }}" class="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800">На главную</a>
                {% endif %}
                {% if connected %}
                <form method="post" action="{{ url_for('logout') }}" onsubmit="return confirm('Завершить текущую сессию?');">
                    <button type="submit" class="px-4 py-2 rounded-lg border border-slate-300 text-sm text-slate-700 hover:border-slate-900">Выйти</button>
                </form>
                {% endif %}
            </div>
        </div>
    </main>
</body>
</html>
